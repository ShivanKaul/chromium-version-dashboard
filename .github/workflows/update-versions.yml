name: Update browser versions

on:
  schedule:
    - cron: '0 8 * * *'
    # Fallback run in case the first one fails due to runner availability
    - cron: '0 9 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install 7zip (for .deb and Atlas DMG extraction)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq 7zip

      - name: Detect versions and update ci-versions.json
        run: node .github/update-versions.js

      - name: Validate ci-versions.json
        run: node test/validate-versions.js ci-versions.json

      - name: Record daily snapshot
        run: node .github/snapshot-versions.js

      - name: Commit and push if changed
        run: |
          git add ci-versions.json snapshots.ndjson
          git diff --quiet --cached && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update browser versions ($(date -u +%Y-%m-%d))"
          git push
