<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chromium Version Dashboard</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f3f4f6;
      --surface: #ffffff;
      --text: #111827;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2563eb;
      --green: #15803d;
      --green-bg: #bbf7d0;
      --yellow: #a16207;
      --yellow-bg: #fde68a;
      --orange: #c2410c;
      --orange-bg: #fdba74;
      --red: #b91c1c;
      --red-bg: #fca5a5;
      --gray: #6b7280;
      --gray-bg: #f9fafb;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111827;
        --surface: #1f2937;
        --text: #f3f4f6;
        --text-muted: #9ca3af;
        --border: #374151;
        --green-bg: #065f46;
        --yellow-bg: #92400e;
        --orange-bg: #9a3412;
        --red-bg: #991b1b;
        --gray-bg: #1f2937;
      }
      .delta-0, .delta-1, .delta-2, .delta-3 {
        background: rgba(0,0,0,0.3);
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 24px 32px;
    }
    header h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    header .subtitle { color: var(--text-muted); font-size: 14px; }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 32px;
      flex-wrap: wrap;
    }
    .toolbar .meta { color: var(--text-muted); font-size: 13px; }
    .toolbar button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .toolbar button:hover { opacity: 0.85; }
    .toolbar button:disabled { opacity: 0.5; cursor: not-allowed; }

    main { padding: 0 32px 48px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      transition: box-shadow 0.15s, background 0.2s, border-color 0.2s;
    }
    .card:hover { box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06); }
    .card.reference { border-color: var(--accent); border-width: 2px; }
    .card.card-green { background: var(--green-bg); border-color: var(--green); }
    .card.card-yellow { background: var(--yellow-bg); border-color: var(--yellow); }
    .card.card-orange { background: var(--orange-bg); border-color: var(--orange); }
    .card.card-red { background: var(--red-bg); border-color: var(--red); }
    .card .browser-name {
      font-size: 15px; font-weight: 600; margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .card .browser-name .ref-badge {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; background: var(--accent); color: #fff;
      padding: 2px 7px; border-radius: 4px;
    }
    .card .cr-major { font-size: 40px; font-weight: 800; line-height: 1; margin-bottom: 6px; }
    .card .cr-full { font-size: 13px; color: var(--text-muted); margin-bottom: 14px; min-height: 18px; }
    .card .delta {
      display: inline-block; font-size: 12px; font-weight: 600;
      padding: 3px 10px; border-radius: 20px;
    }
    .delta-0 { background: rgba(255,255,255,0.6); color: var(--green); }
    .delta-1 { background: rgba(255,255,255,0.6); color: var(--yellow); }
    .delta-2 { background: rgba(255,255,255,0.6); color: var(--orange); }
    .delta-3 { background: rgba(255,255,255,0.6); color: var(--red); }
    .delta-unknown { background: var(--gray-bg); color: var(--gray); }
    .card .source { margin-top: 12px; font-size: 11px; color: var(--text-muted); }
    .card.error-card .cr-major { font-size: 16px; font-weight: 500; color: var(--red); }

    .loading-state {
      text-align: center; padding: 80px 20px;
      color: var(--text-muted); font-size: 15px;
    }
    .spinner {
      display: inline-block; width: 28px; height: 28px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, var(--bg) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
      color: transparent !important;
      user-select: none;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    @media (max-width: 600px) {
      header, .toolbar, main { padding-left: 16px; padding-right: 16px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Chromium Version Dashboard</h1>
    <div class="subtitle">Which Chromium version is each desktop browser shipping? (<a href="https://github.com/ShivanKaul/chromium-version-dashboard" style="color: var(--accent)">GitHub repo</a>)</div>
  </header>

  <div class="toolbar">
    <button id="refresh-btn" onclick="refresh()">Refresh</button>
    <span class="meta" id="status">Loading...</span>
  </div>

  <main>
    <div id="content">
      <div id="grid" class="grid"></div>
    </div>
  </main>

  <script>
    const ORDER = [
      "Chrome Stable", "Brave Release", "Vivaldi Release",
      "Comet", "Opera", "Edge",
    ];

    // State shared across card updates
    let chromeMajor = null;

    function esc(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function dCls(d) {
      if (d == null) return "delta-unknown";
      if (d === 0) return "delta-0";
      if (d === 1) return "delta-1";
      return "delta-3";
    }

    function cardColorCls(d) {
      if (d == null) return "";
      if (d === 0) return "card-green";
      if (d === 1) return "card-yellow";
      if (d === 2) return "card-orange";
      return "card-red";
    }

    function dLabel(d, ref) {
      if (ref) return "baseline";
      if (d == null) return "unknown";
      if (d === 0) return "up to date";
      return d + " major version" + (d > 1 ? "s" : "") + " behind";
    }

    // Render one card's inner HTML from a result object
    function cardHTML(e) {
      const ref = e.browser === "Chrome Stable";
      const err = !!e.error;
      const delta = chromeMajor != null && e.chromiumMajor != null ? chromeMajor - e.chromiumMajor : null;

      if (err) {
        return '<div class="browser-name">' + esc(e.browser) + '</div>' +
          '<div class="cr-major">Unavailable</div>' +
          '<div class="cr-full">' + esc(e.error) + '</div>' +
          '<span class="delta ' + dCls(null) + '">' + dLabel(null) + '</span>';
      }
      return '<div class="browser-name">' + esc(e.browser) +
          (ref ? ' <span class="ref-badge">baseline</span>' : '') + '</div>' +
        '<div class="cr-major">' + (e.chromiumMajor || "?") + '</div>' +
        '<div class="cr-full">' +
          (e.chromiumVersion ? esc(e.chromiumVersion) : "major version only") + '</div>' +
        '<span class="delta ' + dCls(delta) + '">' + dLabel(delta, ref) + '</span>' +
        '<div class="source">' + esc(e.source) + '</div>';
    }

    // Build the grid with skeleton cards for every browser in ORDER
    function renderSkeletons() {
      const grid = document.getElementById("grid");
      grid.innerHTML = "";
      for (const name of ORDER) {
        const c = document.createElement("div");
        c.className = "card";
        c.dataset.browser = name;
        const ref = name === "Chrome Stable";
        if (ref) c.classList.add("reference");
        c.innerHTML =
          '<div class="browser-name">' + esc(name) +
            (ref ? ' <span class="ref-badge">baseline</span>' : '') + '</div>' +
          '<div class="cr-major skeleton">&nbsp;&nbsp;&nbsp;&nbsp;</div>' +
          '<div class="cr-full skeleton">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</div>' +
          '<span class="delta delta-unknown skeleton">loading</span>';
        grid.appendChild(c);
      }
    }

    // Update a single card when its data arrives
    function updateCard(e) {
      if (e.browser === "Chrome Stable" && e.chromiumMajor != null) {
        chromeMajor = e.chromiumMajor;
        // Recalculate delta badges on cards already rendered
        const grid = document.getElementById("grid");
        for (const c of grid.querySelectorAll(".card[data-loaded]")) {
          const browser = c.dataset.browser;
          const major = parseInt(c.dataset.chromiumMajor, 10);
          if (!isNaN(major)) {
            const delta = chromeMajor - major;
            const span = c.querySelector(".delta");
            if (span) {
              span.className = "delta " + dCls(delta);
              span.textContent = dLabel(delta, browser === "Chrome Stable");
            }
            c.classList.remove("card-green", "card-yellow", "card-orange", "card-red");
            const cc = cardColorCls(delta);
            if (cc) c.classList.add(cc);
          }
        }
      }

      const ref = e.browser === "Chrome Stable";
      const err = !!e.error;

      // Find the existing skeleton card or fall back to appending
      const grid = document.getElementById("grid");
      let c = grid.querySelector('[data-browser="' + CSS.escape(e.browser) + '"]');
      if (!c) {
        c = document.createElement("div");
        c.dataset.browser = e.browser;
        grid.appendChild(c);
      }

      const delta = chromeMajor != null && e.chromiumMajor != null ? chromeMajor - e.chromiumMajor : null;
      const cc = cardColorCls(delta);
      c.className = "card" + (ref ? " reference" : "") + (err ? " error-card" : "") + (cc ? " " + cc : "");
      c.dataset.loaded = "1";
      c.dataset.chromiumMajor = e.chromiumMajor != null ? e.chromiumMajor : "";
      c.innerHTML = cardHTML(e);
    }

    async function load(bust) {
      const btn = document.getElementById("refresh-btn");
      btn.disabled = true;
      chromeMajor = null;
      renderSkeletons();
      document.getElementById("status").textContent = "Loading…";

      try {
        const url = "./api" + (bust ? "?t=" + Date.now() : "");
        const r = await fetch(url);
        if (!r.ok) throw new Error("API returned " + r.status);

        const reader = r.body.getReader();
        const decoder = new TextDecoder();
        let buf = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const lines = buf.split("\n");
          buf = lines.pop(); // keep any incomplete trailing line
          for (const line of lines) {
            if (!line.trim()) continue;
            const obj = JSON.parse(line);
            if ("fetchedAt" in obj) {
              document.getElementById("status").textContent =
                "Last fetched: " + new Date(obj.fetchedAt).toLocaleString();
            } else {
              updateCard(obj);
            }
          }
        }
        // Flush any remaining bytes in the TextDecoder
        buf += decoder.decode();
        // Flush any remaining buffered content
        if (buf.trim()) {
          const obj = JSON.parse(buf);
          if ("fetchedAt" in obj) {
            document.getElementById("status").textContent =
              "Last fetched: " + new Date(obj.fetchedAt).toLocaleString();
          } else {
            updateCard(obj);
          }
        }
      } catch (err) {
        document.getElementById("status").textContent = "Error: " + err.message;
      } finally {
        btn.disabled = false;
      }
    }

    function refresh() { load(true); }
    load(false);
    setInterval(() => load(false), 5 * 60 * 1000);
  </script>
</body>
</html>
