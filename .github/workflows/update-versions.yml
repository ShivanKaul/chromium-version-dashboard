name: Update browser versions

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install p7zip (for Atlas DMG extraction)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq p7zip-full

      - name: Detect versions and update manual-versions.json
        run: node update-versions.js

      - name: Validate updated file
        run: node validate-manual-versions.js

      - name: Commit and push if changed
        run: |
          git diff --quiet manual-versions.json && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manual-versions.json
          git commit -m "Update browser versions ($(date -u +%Y-%m-%d))"
          git push
